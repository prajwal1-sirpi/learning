<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EduLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Reset Password</h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter your email address and we'll send you a link to reset your password.
            </p>
        </div>
        
        <!-- Error/Success Message Container -->
        <div id="message-container" class="hidden rounded-md p-4 text-sm font-medium">
        </div>

        <form id="forgot-form" class="mt-8 space-y-6">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email-address" class="block text-sm font-medium text-gray-700">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required 
                        class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm mt-1" 
                        placeholder="Enter your registered email">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500 transition flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Back to sign in
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" id="reset-btn"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition shadow-md hover:shadow-lg">
                    Send Reset Link
                </button>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <!-- Firebase Auth Logic -->
    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBkQPyOFHFotKKqZvIupi_mXFSZEP5ONso",
            authDomain: "edulearn-c81a8.firebaseapp.com",
            projectId: "edulearn-c81a8",
            storageBucket: "edulearn-c81a8.firebasestorage.app",
            messagingSenderId: "243201120910",
            appId: "1:243201120910:android:d8b506fb0b843c6cbc47df"
        };

        // 2. Initialize Firebase and Auth
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 3. UI Elements
        const form = document.getElementById('forgot-form');
        const messageContainer = document.getElementById('message-container');
        const resetBtn = document.getElementById('reset-btn');

        function showMessage(msg, isError = false) {
            messageContainer.classList.remove('hidden', 'bg-red-50', 'text-red-800', 'bg-green-50', 'text-green-800');
            if (isError) {
                messageContainer.classList.add('bg-red-50', 'text-red-800');
            } else {
                messageContainer.classList.add('bg-green-50', 'text-green-800');
            }
            messageContainer.innerText = msg;
        }

        // 4. Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageContainer.classList.add('hidden');
            
            const email = document.getElementById('email-address').value;

            try {
                // Disable button during processing
                resetBtn.disabled = true;
                resetBtn.innerText = "Sending...";

                // Send password reset email
                await auth.sendPasswordResetEmail(email);
                
                // Show success message
                showMessage("Password reset email sent. Please check your inbox to set a new password.", false);
                form.reset();

            } catch (error) {
                console.error("Password reset error:", error.code);
                // Handle common Firebase Auth errors
                switch (error.code) {
                    case 'auth/user-not-found':
                        showMessage("User not found. Please check the email address.", true);
                        break;
                    case 'auth/invalid-email':
                        showMessage("Invalid email format.", true);
                        break;
                    default:
                        showMessage(error.message, true);
                }
            } finally {
                // Re-enable button
                resetBtn.disabled = false;
                resetBtn.innerText = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
