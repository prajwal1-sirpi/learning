<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EduLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Create an account</h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Or
                <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500 transition">
                    sign in to your existing account
                </a>
            </p>
        </div>
        
        <!-- Error/Success Message Container -->
        <div id="message-container" class="hidden rounded-md p-4 text-sm font-medium">
        </div>

        <form id="signup-form" class="mt-8 space-y-6">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email-address" class="block text-sm font-medium text-gray-700">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required 
                        class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm mt-1" 
                        placeholder="Enter your email">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required 
                        class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm mt-1" 
                        placeholder="Create a password (min 6 characters)">
                </div>
            </div>

            <div>
                <button type="submit" id="signup-btn"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition shadow-md hover:shadow-lg">
                    Sign up
                </button>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <!-- Firebase Auth Logic -->
    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBkQPyOFHFotKKqZvIupi_mXFSZEP5ONso",
            authDomain: "edulearn-c81a8.firebaseapp.com",
            projectId: "edulearn-c81a8",
            storageBucket: "edulearn-c81a8.firebasestorage.app",
            messagingSenderId: "243201120910",
            appId: "1:243201120910:android:d8b506fb0b843c6cbc47df"
        };

        // 2. Initialize Firebase and Auth
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 3. UI Elements
        const form = document.getElementById('signup-form');
        const messageContainer = document.getElementById('message-container');
        const signupBtn = document.getElementById('signup-btn');

        function showMessage(msg, isError = false) {
            messageContainer.classList.remove('hidden', 'bg-red-50', 'text-red-800', 'bg-green-50', 'text-green-800');
            if (isError) {
                messageContainer.classList.add('bg-red-50', 'text-red-800');
            } else {
                messageContainer.classList.add('bg-green-50', 'text-green-800');
            }
            messageContainer.innerText = msg;
        }

        // 4. Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email-address').value;
            const password = document.getElementById('password').value;

            try {
                // Disable button to prevent multiple clicks
                signupBtn.disabled = true;
                signupBtn.innerText = "Signing up...";

                // Create user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // Send email verification
                await userCredential.user.sendEmailVerification();
                
                // Show success message
                showMessage("Verification email sent. Please verify before login.", false);
                form.reset();

            } catch (error) {
                console.error("Signup error:", error.code);
                // Handle common Firebase Auth errors
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        showMessage("This email is already registered.", true);
                        break;
                    case 'auth/invalid-email':
                        showMessage("Invalid email format.", true);
                        break;
                    case 'auth/weak-password':
                        showMessage("Password should be at least 6 characters.", true);
                        break;
                    default:
                        showMessage(error.message, true);
                }
            } finally {
                // Re-enable button
                signupBtn.disabled = false;
                signupBtn.innerText = "Sign up";
            }
        });
    </script>
</body>
</html>
